<div
  class="layout-container"
  [class.sidebar-collapsed]="sidebarCollapsed"
  [class.menu-open]="mobileMenuOpen"
>
  <div
    class="admin-mobile-backdrop"
    *ngIf="mobileMenuOpen"
    (click)="mobileMenuOpen = false"
    aria-hidden="true"
  ></div>
  <!-- Sidebar -->
  <aside class="sidebar-wrapper glass-panel">
    <app-sidebar [isCollapsed]="sidebarCollapsed" (toggle)="onSidebarToggle()"></app-sidebar>
  </aside>

  <!-- Main Content Area -->
  <div class="main-content">
    <header class="header-wrapper glass-panel">
      <button
        type="button"
        class="admin-mobile-menu-btn"
        (click)="mobileMenuOpen = !mobileMenuOpen"
        aria-label="Open navigation menu"
      >
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
      <app-header></app-header>
    </header>
    
    <main class="content-body">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
