<div class="sidebar-container" [class.is-collapsed]="isCollapsed">
  <div class="logo">
    <div class="logo-icon">
      <img src="assets/images/adnatelogo.png" alt="Adnate IT Solutions Logo" class="logo-img" />
    </div>
    <div class="logo-text" *ngIf="!isCollapsed">
      <span class="brand-title">ADNATE</span>
      <span class="brand-subtitle">Manager</span>
    </div>
  </div>

  <nav class="nav-menu manager-nav">
    <p class="nav-heading" *ngIf="!isCollapsed">Main Navigation</p>
    <ul>
      <li *ngFor="let item of navItems; trackBy: trackByPath">
        <a [routerLink]="item.path" routerLinkActive="active" class="nav-item" [title]="isCollapsed ? item.label : ''">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
          </svg>
          <span *ngIf="!isCollapsed">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer app-sidebar-actions app-sidebar-actions--padded">
    <app-theme-toggle [compact]="isCollapsed"></app-theme-toggle>
    <button type="button" class="sidebar-collapse-btn" (click)="toggleCollapse()" [title]="isCollapsed ? 'Expand menu' : 'Collapse menu'">
      <i [class]="isCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left'"></i>
      <span *ngIf="!isCollapsed">Collapse</span>
    </button>
    <button type="button" class="app-btn-logout" (click)="logout()" title="Logout">
      <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
      <span *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</div>
